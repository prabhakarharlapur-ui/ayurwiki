site_name: Ayurwiki - Ayurveda Knowledge Base
site_url: https://ayurwiki.org
site_description: A comprehensive, open knowledge base on Ayurveda — herbs, medicines, practices, yoga, and traditional wisdom.
site_author: Ayurwiki Contributors

repo_url: https://github.com/hpnadig/ayurwiki
repo_name: hpnadig/ayurwiki
edit_uri: ""

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    scheme: default
    primary: white
    accent: teal
  font:
    text: sans-serif
    code: monospace
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    logo: material/leaf

hooks:
  - scripts/hooks.py

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hpnadig/ayurwiki
  generator: false

extra_css:
  - stylesheets/extra.css
  - stylesheets/edit-modal.css

extra_javascript:
  - javascripts/edit-modal.js

nav:
  - Home: index.md
  - Knowledge Base:
    - Herbs: herbs/index.md
    - Medicines: medicines/index.md
    - Yoga: yoga/index.md
    - Concepts: concepts/index.md
    - Physiology: physiology/index.md
    - Practices: practices/index.md
    - Traditions: traditions/index.md
  - Directory:
    - Manufacturers: manufacturers/index.md
    - Institutions: institutions/index.md
    - Resources: resources/index.md
  - Browse:
    - All Articles: all-articles.md
    - Categories: categories/index.md
    - Recent Changes: recent-changes.md
  - About:
    - Contributing: contributing.md
    - Privacy Policy: privacy.md
